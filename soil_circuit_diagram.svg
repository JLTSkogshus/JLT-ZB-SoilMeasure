<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="monospace" font-size="11">
  <rect width="900" height="620" fill="#1e1e2e"/>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" fill="#cdd6f4" font-size="15" font-weight="bold">JLT-ZB-SoilMeasure — Circuit Diagram (3-sensor config)</text>

  <!-- ── 18650 Battery ── -->
  <rect x="30" y="60" width="120" height="70" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="90" y="82" text-anchor="middle" fill="#a6e3a1" font-weight="bold">18650</text>
  <text x="90" y="97" text-anchor="middle" fill="#a6e3a1">Li-Ion Battery</text>
  <text x="90" y="112" text-anchor="middle" fill="#a6e3a1">3.7 V</text>
  <!-- BAT+ terminal -->
  <line x1="90" y1="130" x2="90" y2="155" stroke="#f38ba8" stroke-width="2"/>
  <text x="96" y="150" fill="#f38ba8" font-size="10">BAT+</text>
  <!-- BAT- terminal -->
  <line x1="50" y1="130" x2="50" y2="185" stroke="#6c7086" stroke-width="2"/>
  <text x="55" y="180" fill="#6c7086" font-size="10">GND</text>

  <!-- ── Voltage Divider ── -->
  <rect x="160" y="55" width="130" height="90" rx="6" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <text x="225" y="75" text-anchor="middle" fill="#fab387" font-weight="bold">Voltage Divider</text>
  <!-- R1 -->
  <text x="175" y="95" fill="#cdd6f4">BAT+ ─[R1 100kΩ]─┐</text>
  <!-- R2 -->
  <text x="175" y="112" fill="#cdd6f4">           ├─[R2 100kΩ]─GND</text>
  <!-- Out -->
  <text x="175" y="129" fill="#fab387">           └─ A0/GPIO2</text>
  <!-- Wire: Battery+ to divider -->
  <line x1="90" y1="155" x2="90" y2="165" stroke="#f38ba8" stroke-width="2"/>
  <line x1="90" y1="165" x2="160" y2="165" stroke="#f38ba8" stroke-width="2"/>
  <line x1="160" y1="165" x2="160" y2="95" stroke="#f38ba8" stroke-width="2"/>
  <line x1="160" y1="95" x2="160" y2="88" stroke="#f38ba8" stroke-width="2"/>
  <polygon points="160,82 157,92 163,92" fill="#f38ba8"/>

  <!-- ── XIAO ESP32-C6 ── -->
  <rect x="330" y="40" width="200" height="240" rx="8" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="430" y="62" text-anchor="middle" fill="#89b4fa" font-size="13" font-weight="bold">XIAO ESP32-C6</text>
  <!-- Pin labels left side -->
  <text x="338" y="88"  fill="#cdd6f4">BAT+</text>
  <text x="338" y="108" fill="#cdd6f4">GND</text>
  <text x="338" y="128" fill="#cdd6f4">3V3 (out)</text>
  <text x="338" y="148" fill="#cdd6f4">A0 / GPIO2</text>
  <text x="338" y="168" fill="#cdd6f4">A1 / GPIO3</text>
  <!-- Pin labels right side -->
  <text x="438" y="88"  fill="#cdd6f4">D4/SDA/GPIO6</text>
  <text x="438" y="108" fill="#cdd6f4">D5/SCL/GPIO7</text>
  <!-- Pin dots left -->
  <circle cx="332" cy="85"  r="3" fill="#89b4fa"/>
  <circle cx="332" cy="105" r="3" fill="#89b4fa"/>
  <circle cx="332" cy="125" r="3" fill="#89b4fa"/>
  <circle cx="332" cy="145" r="3" fill="#89b4fa"/>
  <circle cx="332" cy="165" r="3" fill="#89b4fa"/>
  <!-- Pin dots right -->
  <circle cx="528" cy="85"  r="3" fill="#89b4fa"/>
  <circle cx="528" cy="105" r="3" fill="#89b4fa"/>

  <!-- Wire: Battery+ → XIAO BAT+ -->
  <line x1="90" y1="155" x2="90" y2="200" stroke="#f38ba8" stroke-width="2"/>
  <line x1="90" y1="200" x2="310" y2="200" stroke="#f38ba8" stroke-width="2"/>
  <line x1="310" y1="200" x2="310" y2="85" stroke="#f38ba8" stroke-width="2"/>
  <line x1="310" y1="85" x2="332" y2="85" stroke="#f38ba8" stroke-width="2"/>

  <!-- GND rail -->
  <line x1="50" y1="185" x2="50" y2="580" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="35" y="575" fill="#6c7086" font-size="10">GND</text>
  <!-- XIAO GND -->
  <line x1="50" y1="400" x2="310" y2="400" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="310" y1="400" x2="310" y2="105" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="310" y1="105" x2="332" y2="105" stroke="#6c7086" stroke-width="1.5"/>

  <!-- 3V3 rail -->
  <line x1="310" y1="125" x2="332" y2="125" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="310" y1="125" x2="310" y2="340" stroke="#a6e3a1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="296" y="345" fill="#a6e3a1" font-size="10">3V3</text>

  <!-- Voltage divider output → XIAO A0 -->
  <line x1="290" y1="129" x2="310" y2="129" stroke="#fab387" stroke-width="1.5"/>
  <line x1="310" y1="129" x2="310" y2="145" stroke="#fab387" stroke-width="1.5"/>
  <line x1="310" y1="145" x2="332" y2="145" stroke="#fab387" stroke-width="1.5"/>

  <!-- ── ADS1115 ── -->
  <rect x="600" y="40" width="160" height="170" rx="8" fill="#313244" stroke="#cba6f7" stroke-width="2"/>
  <text x="680" y="62" text-anchor="middle" fill="#cba6f7" font-size="12" font-weight="bold">ADS1115</text>
  <text x="680" y="78" text-anchor="middle" fill="#cba6f7" font-size="10">I2C addr 0x48</text>
  <!-- Pin labels left -->
  <text x="608" y="100" fill="#cdd6f4">VDD</text>
  <text x="608" y="118" fill="#cdd6f4">GND</text>
  <text x="608" y="136" fill="#cdd6f4">SDA</text>
  <text x="608" y="154" fill="#cdd6f4">SCL</text>
  <text x="608" y="172" fill="#cdd6f4">ADDR→GND</text>
  <!-- Pin labels right -->
  <text x="706" y="100" fill="#cdd6f4">A0</text>
  <text x="706" y="118" fill="#cdd6f4">A1</text>
  <!-- Pin dots left -->
  <circle cx="604" cy="97"  r="3" fill="#cba6f7"/>
  <circle cx="604" cy="115" r="3" fill="#cba6f7"/>
  <circle cx="604" cy="133" r="3" fill="#cba6f7"/>
  <circle cx="604" cy="151" r="3" fill="#cba6f7"/>
  <circle cx="604" cy="169" r="3" fill="#cba6f7"/>
  <!-- Pin dots right -->
  <circle cx="758" cy="97"  r="3" fill="#cba6f7"/>
  <circle cx="758" cy="115" r="3" fill="#cba6f7"/>

  <!-- SDA wire: XIAO → ADS1115 -->
  <line x1="528" y1="85" x2="570" y2="85" stroke="#f9e2af" stroke-width="1.5"/>
  <line x1="570" y1="85" x2="570" y2="133" stroke="#f9e2af" stroke-width="1.5"/>
  <line x1="570" y1="133" x2="604" y2="133" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="536" y="80" fill="#f9e2af" font-size="10">SDA</text>

  <!-- SCL wire: XIAO → ADS1115 -->
  <line x1="528" y1="105" x2="575" y2="105" stroke="#f9e2af" stroke-width="1.5"/>
  <line x1="575" y1="105" x2="575" y2="151" stroke="#f9e2af" stroke-width="1.5"/>
  <line x1="575" y1="151" x2="604" y2="151" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="536" y="101" fill="#f9e2af" font-size="10">SCL</text>

  <!-- ADS1115 VDD ← 3V3 rail -->
  <line x1="580" y1="97" x2="604" y2="97" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="580" y1="97" x2="580" y2="340" stroke="#a6e3a1" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ADS1115 GND ← GND rail -->
  <line x1="50" y1="430" x2="585" y2="430" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="585" y1="430" x2="585" y2="115" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="585" y1="115" x2="604" y2="115" stroke="#6c7086" stroke-width="1.5"/>

  <!-- ADS1115 ADDR → GND -->
  <line x1="604" y1="169" x2="590" y2="169" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="590" y1="169" x2="590" y2="430" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- ── Soil Sensor 1 ── (ADS1115 A0) -->
  <rect x="720" y="260" width="150" height="80" rx="6" fill="#313244" stroke="#94e2d5" stroke-width="1.5"/>
  <text x="795" y="280" text-anchor="middle" fill="#94e2d5" font-weight="bold">Soil Sensor 1</text>
  <text x="795" y="296" text-anchor="middle" fill="#94e2d5" font-size="10">Cap. Moisture V1.2</text>
  <text x="728" y="315" fill="#cdd6f4">VCC  GND  AOUT</text>
  <circle cx="735" cy="328" r="3" fill="#94e2d5"/>
  <circle cx="760" cy="328" r="3" fill="#94e2d5"/>
  <circle cx="800" cy="328" r="3" fill="#94e2d5"/>
  <!-- AOUT → ADS1115 A0 -->
  <line x1="800" y1="328" x2="800" y2="240" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="800" y1="240" x2="770" y2="240" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="770" y1="240" x2="770" y2="97" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="770" y1="97" x2="758" y2="97" stroke="#94e2d5" stroke-width="1.5"/>
  <text x="808" y="260" fill="#94e2d5" font-size="10">AOUT→A0</text>
  <!-- VCC -->
  <line x1="735" y1="328" x2="735" y2="350" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="735" y1="350" x2="580" y2="350" stroke="#a6e3a1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- GND -->
  <line x1="760" y1="328" x2="760" y2="360" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="760" y1="360" x2="50"  y2="360" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── Soil Sensor 2 ── (ADS1115 A1) -->
  <rect x="720" y="380" width="150" height="80" rx="6" fill="#313244" stroke="#94e2d5" stroke-width="1.5"/>
  <text x="795" y="400" text-anchor="middle" fill="#94e2d5" font-weight="bold">Soil Sensor 2</text>
  <text x="795" y="416" text-anchor="middle" fill="#94e2d5" font-size="10">Cap. Moisture V1.2</text>
  <text x="728" y="435" fill="#cdd6f4">VCC  GND  AOUT</text>
  <circle cx="735" cy="448" r="3" fill="#94e2d5"/>
  <circle cx="760" cy="448" r="3" fill="#94e2d5"/>
  <circle cx="800" cy="448" r="3" fill="#94e2d5"/>
  <!-- AOUT → ADS1115 A1 -->
  <line x1="800" y1="448" x2="800" y2="470" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="800" y1="470" x2="775" y2="470" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="775" y1="470" x2="775" y2="115" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="775" y1="115" x2="758" y2="115" stroke="#94e2d5" stroke-width="1.5"/>
  <text x="808" y="462" fill="#94e2d5" font-size="10">AOUT→A1</text>
  <!-- VCC -->
  <line x1="735" y1="448" x2="735" y2="490" stroke="#a6e3a1" stroke-width="1.5"/>
  <line x1="735" y1="490" x2="580" y2="490" stroke="#a6e3a1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- GND -->
  <line x1="760" y1="448" x2="760" y2="500" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="760" y1="500" x2="50"  y2="500" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- ── Soil Sensor 3 ── (XIAO A1/GPIO3) -->
  <rect x="330" y="360" width="150" height="80" rx="6" fill="#313244" stroke="#94e2d5" stroke-width="1.5"/>
  <text x="405" y="380" text-anchor="middle" fill="#94e2d5" font-weight="bold">Soil Sensor 3</text>
  <text x="405" y="396" text-anchor="middle" fill="#94e2d5" font-size="10">Cap. Moisture V1.2</text>
  <text x="338" y="415" fill="#cdd6f4">VCC  GND  AOUT</text>
  <circle cx="345" cy="428" r="3" fill="#94e2d5"/>
  <circle cx="370" cy="428" r="3" fill="#94e2d5"/>
  <circle cx="405" cy="428" r="3" fill="#94e2d5"/>
  <!-- AOUT → XIAO A1/GPIO3 -->
  <line x1="405" y1="428" x2="405" y2="450" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="405" y1="450" x2="320" y2="450" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="320" y1="450" x2="320" y2="165" stroke="#94e2d5" stroke-width="1.5"/>
  <line x1="320" y1="165" x2="332" y2="165" stroke="#94e2d5" stroke-width="1.5"/>
  <text x="412" y="445" fill="#94e2d5" font-size="10">AOUT→A1/GPIO3</text>
  <!-- VCC -->
  <line x1="345" y1="428" x2="310" y2="428" stroke="#a6e3a1" stroke-width="1.5" stroke-dasharray="4,3"/>
  <!-- GND -->
  <line x1="370" y1="428" x2="370" y2="510" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="370" y1="510" x2="50"  y2="510" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="30" y="540" width="500" height="65" rx="4" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="40" y="558" fill="#cdd6f4" font-size="11" font-weight="bold">Legend</text>
  <line x1="40" y1="572" x2="70" y2="572" stroke="#f38ba8" stroke-width="2"/>
  <text x="75" y="576" fill="#cdd6f4" font-size="10">Battery power (+)</text>
  <line x1="40" y1="589" x2="70" y2="589" stroke="#6c7086" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="75" y="593" fill="#cdd6f4" font-size="10">GND</text>
  <line x1="180" y1="572" x2="210" y2="572" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="215" y="576" fill="#cdd6f4" font-size="10">3.3 V rail</text>
  <line x1="180" y1="589" x2="210" y2="589" stroke="#f9e2af" stroke-width="2"/>
  <text x="215" y="593" fill="#cdd6f4" font-size="10">I2C (SDA/SCL)</text>
  <line x1="320" y1="572" x2="350" y2="572" stroke="#94e2d5" stroke-width="2"/>
  <text x="355" y="576" fill="#cdd6f4" font-size="10">Analog signal (AOUT)</text>
  <line x1="320" y1="589" x2="350" y2="589" stroke="#fab387" stroke-width="2"/>
  <text x="355" y="593" fill="#cdd6f4" font-size="10">Battery voltage divider output</text>
</svg>
