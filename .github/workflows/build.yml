name: Build & Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write            # required for creating GitHub Releases

env:
  SKETCH: XIAO-ESP32-C6-SoilMonitor
  FQBN:   esp32:esp32:XIAO_ESP32C6:ZigbeeMode=ed,PartitionScheme=zigbee

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Parse version from config.h (OTA_RUNNING_VERSION 0xMMmmppbb) ─────────
      - name: Determine version
        id: ver
        run: |
          HEX=$(grep -oP '#define OTA_RUNNING_VERSION\s+\K0x[0-9A-Fa-f]+' \
            ${{ env.SKETCH }}/config.h)
          DEC=$((HEX))
          MAJ=$(( (DEC >> 24) & 0xFF ))
          MIN=$(( (DEC >> 16) & 0xFF ))
          PAT=$(( (DEC >>  8) & 0xFF ))
          TAG="v${MAJ}.${MIN}.${PAT}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Detected version: ${TAG}  (${HEX})"
          # Only release on push to master when this major.minor.patch tag is new.
          if [[ "${{ github.event_name }}" == "push" ]] && ! git tag | grep -qx "${TAG}"; then
            echo "is_release=true"  >> $GITHUB_OUTPUT
            echo "→ New version – will create release."
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "→ Tag ${TAG} already exists or this is a PR – skipping release."
          fi

      # ── Arduino CLI ───────────────────────────────────────────────────────────
      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2
        with:
          version: "1.5.0"

      # Cache the entire ~/.arduino15 directory (board packages + libraries ~1.5 GB).
      # The key includes the ESP32 version so the cache is rebuilt on toolchain bumps.
      - name: Cache Arduino packages
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino/libraries
          key: arduino15-esp32-3.3.8-libs-v2
          restore-keys: |
            arduino15-esp32-3.3.8-libs-
            arduino15-esp32-3.3.8-

      - name: Install ESP32 board package and libraries
        run: |
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.8
          arduino-cli lib update-index
          arduino-cli lib install "Adafruit ADS1X15"
          arduino-cli lib install "Adafruit BusIO"

      # ── Compile ───────────────────────────────────────────────────────────────
      - name: Compile sketch
        run: |
          mkdir -p build
          arduino-cli compile \
            --fqbn "${{ env.FQBN }}" \
            --output-dir build \
            "${{ env.SKETCH }}"

      # ── Create Zigbee OTA image (.zigbee) ─────────────────────────────────────
      - name: Create OTA image
        if: steps.ver.outputs.is_release == 'true'
        run: |
          python3 tools/create_ota_image.py \
            "build/${{ env.SKETCH }}.ino.bin" \
            "${{ steps.ver.outputs.tag }}" \
            "build/JLT-ZB-SoilMeasure_v${{ steps.ver.outputs.tag }}.zigbee"
          # Fixed-name copies → stable /releases/latest/download/ URLs
          cp "build/JLT-ZB-SoilMeasure_v${{ steps.ver.outputs.tag }}.zigbee" \
             "build/JLT-ZB-SoilMeasure.zigbee"
          cp "build/${{ env.SKETCH }}.ino.bin" \
             "build/JLT-ZB-SoilMeasure.bin"

      # ── Upload build artifacts (visible on every run, 90-day retention) ───────
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.ver.outputs.tag }}
          path: |
            build/${{ env.SKETCH }}.ino.bin
            build/${{ env.SKETCH }}.ino.bootloader.bin
            build/${{ env.SKETCH }}.ino.partitions.bin
            build/*.zigbee
          if-no-files-found: ignore
          retention-days: 90

      # ── Create git tag for this release ──────────────────────────────────────
      - name: Create git tag
        if: steps.ver.outputs.is_release == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      # ── Create a GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.ver.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.ver.outputs.tag }}"
          body: |
            ## JLT ZB-SoilMeasure v${{ steps.ver.outputs.tag }}

            | File | Purpose |
            |------|---------|
            | `JLT-ZB-SoilMeasure.zigbee` | **Stable URL** – always the latest OTA image |
            | `JLT-ZB-SoilMeasure.bin` | **Stable URL** – always the latest firmware binary |
            | `*.ino.bin` | Flash via USB with `arduino-cli upload` |
            | `*.ino.bootloader.bin` | Bootloader (needed for full erase-flash) |
            | `*.ino.partitions.bin` | Partition table |
            | `*.zigbee` | **OTA update via zigbee2mqtt** (no USB needed) |

            ### OTA update steps
            1. Copy `JLT-ZB-SoilMeasure_v${{ steps.ver.outputs.tag }}.zigbee` to your zigbee2mqtt data directory
            2. In z2m web UI: **Devices → JLT ZB-SoilMeasure → OTA → Perform update**
            3. The device picks up the update on its next wake-up (within `sleep_duration` seconds)

            ### USB flash
            ```
            arduino-cli upload \
              --fqbn "esp32:esp32:XIAO_ESP32C6:ZigbeeMode=ed,PartitionScheme=zigbee" \
              --port COM<N> \
              --input-file JLT-ZB-SoilMeasure_v${{ steps.ver.outputs.tag }}.ino.bin
            ```
          files: |
            build/${{ env.SKETCH }}.ino.bin
            build/${{ env.SKETCH }}.ino.bootloader.bin
            build/${{ env.SKETCH }}.ino.partitions.bin
            build/JLT-ZB-SoilMeasure_v${{ steps.ver.outputs.tag }}.zigbee
            build/JLT-ZB-SoilMeasure.zigbee
            build/JLT-ZB-SoilMeasure.bin
          draft: false
          prerelease: false
